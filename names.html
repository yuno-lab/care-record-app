<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>対象者名管理｜介護記録テンプレート</title>
  <meta name="description" content="介護記録テンプレートで使用する対象者名を登録・管理するページです。登録した名前は記録ページのプルダウン候補として利用できます。">
  <meta name="robots" content="index, follow">
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="care-record-favicon.svg" type="image/svg+xml">
</head>
<body>
  <main class="container">
    <h1>対象者名管理</h1>

    <nav class="top-nav" aria-label="ページ切り替え">
      <a href="index.html">記録ページ</a>
      <a href="names.html">対象者名管理</a>
      <a href="help.html">使い方</a>
    </nav>

    <section class="site-intro">
      <h2>対象者名を先に登録してください</h2>
      <p>
        記録ページでは、ここで登録した対象者名を選択して介護記録を作成します。
        手入力ではなくプルダウンから選ぶことで、表記ゆれや入力ミスを減らせます。
      </p>
    </section>

    <form id="nameForm">
      <div class="form-group">
        <label for="personName">対象者名</label>
        <input type="text" id="personName" name="personName" placeholder="例: 山田 太郎" required />
      </div>

      <button type="submit">名前を追加する</button>
    </form>

    <section class="record-tools no-print" aria-labelledby="nameToolsHeading">
      <h2 id="nameToolsHeading">データ入出力</h2>
      <div class="tool-buttons">
        <button type="button" id="exportAllDataBtn">JSONでバックアップ</button>
        <label class="file-import-label" for="importAllDataFile">JSONをインポート</label>
        <input type="file" id="importAllDataFile" accept=".json,application/json" />
      </div>
      <p class="help-text">
        エクスポート / インポート対象には、保存済み記録と対象者名一覧の両方が含まれます。
      </p>
    </section>

    <section aria-labelledby="namesHeading" class="records-section">
      <h2 id="namesHeading">登録済み対象者名</h2>
      <div id="namesList"></div>
    </section>
  </main>

  <script src="names.js?v=20260425-1"></script>
</body>
</html>
